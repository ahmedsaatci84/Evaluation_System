{% extends "evaluation_app/base.html" %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">{% if participant %}{% trans "Edit Participant" %}{% else %}{% trans "Add Participant" %}{% endif %}</h1>
        
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            {% if not participant %}
            <div class="mb-3">
                <label for="participant_id" class="form-label">{% trans "Participant ID" %} *</label>
                <input type="number" class="form-control" id="participant_id" name="participant_id" required>
            </div>
            {% endif %}
            
            <div class="mb-3">
                <label for="participant_name" class="form-label">{% trans "Name" %} *</label>
                <input type="text" class="form-control" id="participant_name" name="participant_name" 
                       value="{% if participant %}{{ participant.participant_name }}{% endif %}" required maxlength="35">
            </div>
            
            <div class="mb-3">
                <label for="participant_phone" class="form-label">{% trans "Phone" %}</label>
                <input type="number" class="form-control" id="participant_phone" name="participant_phone" 
                       value="{% if participant %}{{ participant.participant_phone }}{% endif %}">
            </div>
            
            <div class="mb-3">
                <label for="participant_email" class="form-label">{% trans "Email" %}</label>
                <input type="email" class="form-control" id="participant_email" name="participant_email" 
                       value="{% if participant %}{{ participant.participant_email }}{% endif %}" maxlength="50">
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
                <a href="{% url 'participant_list' %}" class="btn btn-secondary">{% trans "Cancel" %}</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
