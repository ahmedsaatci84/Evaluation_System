{% load i18n %}
<!-- Stylish Search Form Component -->
<div class="search-container">
    <form method="get" action="{{ action_url }}" id="searchForm">
        <div class="search-wrapper">
            <div class="search-input-group">
                <i class="bi bi-search search-icon"></i>
                <input type="text" name="search" class="search-input" id="searchInput"
                       placeholder="{{ placeholder }}" 
                       value="{{ search_query|default:'' }}" autocomplete="off">
                <div class="search-loading" id="searchLoading">
                    <div class="search-spinner"></div>
                </div>
                {% if search_query %}
                <a href="{{ action_url }}" class="search-clear-btn">
                    <i class="bi bi-x-circle"></i> {% trans "Clear" %}
                </a>
                {% endif %}
            </div>
        </div>
        {% if search_query %}
        <div class="search-info">
            <div class="search-query-display">
                <i class="bi bi-info-circle"></i>
                <span class="search-query-text">"{{ search_query }}"</span>
            </div>
            <div class="search-results-count">
                {{ results_count }} {% trans "result(s) found" %}
            </div>
        </div>
        {% endif %}
    </form>
</div>

<script>
// Live search with debouncing and loading indicator
(function() {
    const searchInput = document.getElementById('searchInput');
    const searchForm = document.getElementById('searchForm');
    const searchLoading = document.getElementById('searchLoading');
    let debounceTimer;
    
    if (searchInput && searchForm) {
        searchInput.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            if (searchLoading) searchLoading.classList.add('active');
            
            debounceTimer = setTimeout(function() {
                searchForm.submit();
            }, 500);
        });
    }
})();
</script>
