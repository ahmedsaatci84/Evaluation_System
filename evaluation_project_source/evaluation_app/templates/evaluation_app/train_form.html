{% extends "evaluation_app/base.html" %}
{% load i18n %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">
            {% if train %}
                {% trans "Edit Training Session" %}
            {% else %}
                {% trans "Add Training Session" %}
            {% endif %}
        </h1>
        
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="course" class="form-label">{% trans "Course" %} *</label>
                <select class="form-select" id="course" name="course" required>
                    <option value="">{% trans "Select Course" %}</option>
                    {% for course in courses %}
                    <option value="{{ course.cid }}" 
                            data-professor-id="{% if course.prof_id %}{{ course.prof_id }}{% endif %}"
                            {% if train and train.course_id == course.cid %}selected{% endif %}>
                        {{ course.coursename }}-{{ course.prof.profname }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label for="professor" class="form-label">{% trans "Professor" %} *</label>
                <select class="form-select" id="professor" name="professor" required disabled>
                    <option value="">{% trans "Select Professor" %}</option>
                    {% for professor in professors %}
                    <option value="{{ professor.profid }}" 
                            {% if train and train.professor_id == professor.profid %}selected{% endif %}>
                        {{ professor.profname }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label for="location" class="form-label">{% trans "Location" %} *</label>
                <select class="form-select" id="location" name="location" required>
                    <option value="">{% trans "Select Location" %}</option>
                    {% for location in locations %}
                    <option value="{{ location.id }}" 
                            {% if train and train.location_id == location.id %}selected{% endif %}>
                        {{ location.locationname }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="mb-3">
                <label for="train_date" class="form-label">{% trans "Training Date" %}</label>
                <input type="date" class="form-control" id="train_date" name="train_date" 
                       value="{% if train and train.train_date %}{{ train.train_date|date:'Y-m-d' }}{% endif %}">
            </div>
            
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="is_active" name="is_active" 
                       {% if not train or train.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">
                    {% trans "Active" %}
                </label>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> {% trans "Save" %}
                </button>
                <a href="{% url 'train_list' %}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> {% trans "Cancel" %}
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const courseSelect = document.getElementById('course');
    const professorSelect = document.getElementById('professor');
    const form = professorSelect.closest('form');
    
    function updateProfessorSelection() {
        const selectedCourse = courseSelect.options[courseSelect.selectedIndex];
        const professorId = selectedCourse.getAttribute('data-professor-id');
        
        if (professorId) {
            professorSelect.value = professorId;
        } else {
            professorSelect.value = '';
        }
    }
    
    // Update professor when course changes
    courseSelect.addEventListener('change', updateProfessorSelection);
    
    // Initialize professor selection on page load
    updateProfessorSelection();
    
    // Enable professor field before form submission to allow value to be sent
    form.addEventListener('submit', function() {
        professorSelect.disabled = false;
    });
});
</script>
{% endblock %}
