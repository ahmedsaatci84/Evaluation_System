{% extends "evaluation_app/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">{% if course %}تعديل{% else %}إضافة{% endif %} مادة دراسية</h1>
        
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="courseid" class="form-label">معرف المادة</label>
                <input type="text" class="form-control" id="courseid" name="courseid" 
                       value="{% if course %}{{ course.courseid }}{% endif %}" maxlength="50">
            </div>
            
            <div class="mb-3">
                <label for="coursename" class="form-label">اسم المادة *</label>
                <input type="text" class="form-control" id="coursename" name="coursename" 
                       value="{% if course %}{{ course.coursename }}{% endif %}" required maxlength="50">
            </div>
            
            <div class="mb-3">
                <label for="prof" class="form-label">الأستاذ</label>
                <select class="form-select" id="prof" name="prof">
                    <option value="">اختر أستاذ</option>
                    {% for professor in professors %}
                    <option value="{{ professor.profid }}" 
                            {% if course and course.prof_id == professor.profid %}selected{% endif %}>
                        {{ professor.profname }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">حفظ</button>
                <a href="{% url 'course_list' %}" class="btn btn-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
