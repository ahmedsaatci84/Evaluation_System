{% extends "evaluation_app/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">{% if location %}تعديل{% else %}إضافة{% endif %} موقع</h1>
        
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="locationname" class="form-label">اسم الموقع *</label>
                <input type="text" class="form-control" id="locationname" name="locationname" 
                       value="{% if location %}{{ location.locationname }}{% endif %}" required maxlength="50">
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">حفظ</button>
                <a href="{% url 'location_list' %}" class="btn btn-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
