{% extends "evaluation_app/base.html" %}
{% load i18n %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <h1 class="mb-4">{% trans "Edit Contact Message" %}</h1>

        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="name" class="form-label">{% trans "Name" %} *</label>
                <input type="text" class="form-control" id="name" name="name" 
                       value="{{ contact.name }}" required maxlength="100">
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">{% trans "Email" %} *</label>
                <input type="email" class="form-control" id="email" name="email" 
                       value="{{ contact.email }}" required>
            </div>
            
            <div class="mb-3">
                <label for="phone" class="form-label">{% trans "Phone" %}</label>
                <input type="text" class="form-control" id="phone" name="phone" 
                       value="{{ contact.phone|default:'' }}" maxlength="20">
            </div>
            
            <div class="mb-3">
                <label for="subject" class="form-label">{% trans "Subject" %} *</label>
                <input type="text" class="form-control" id="subject" name="subject" 
                       value="{{ contact.subject }}" required maxlength="200">
            </div>
            
            <div class="mb-3">
                <label for="message" class="form-label">{% trans "Message" %} *</label>
                <textarea class="form-control" id="message" name="message" rows="6" required>{{ contact.message }}</textarea>
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="is_read" name="is_read" 
                           {% if contact.is_read %}checked{% endif %}>
                    <label class="form-check-label" for="is_read">
                        {% trans "Mark as Read" %}
                    </label>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">{% trans "Received Date" %}</label>
                <input type="text" class="form-control" value="{{ contact.created_at|date:'Y-m-d H:i:s' }}" readonly disabled>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> {% trans "Save Changes" %}
                </button>
                <a href="{% url 'contact_list' %}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> {% trans "Cancel" %}
                </a>
            </div>

            
        </form>
          
    </div>
</div>
{% endblock %}
