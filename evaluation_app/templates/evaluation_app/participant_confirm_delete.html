{% extends "evaluation_app/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="mb-4">حذف مشارك</h1>
        
        <div class="alert alert-danger">
            <h5>هل أنت متأكد من حذف هذا المشارك؟</h5>
            <p><strong>المعرف:</strong> {{ participant.participant_id }}</p>
            <p><strong>الاسم:</strong> {{ participant.participant_name }}</p>
            <p class="text-warning"><strong>تحذير:</strong> سيؤثر هذا أيضًا على التقييمات المرتبطة.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">نعم، حذف</button>
                <a href="{% url 'participant_list' %}" class="btn btn-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
